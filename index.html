<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Union Dance Company</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, orange, yellow);
  color: #222;
}

header {
  text-align: center;
  padding: 60px 20px;
}

nav {
  text-align: center;
  padding: 15px;
  background: rgba(0,0,0,0.1);
}

nav a {
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
  color: black;
}

section {
  padding: 50px 20px;
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px;
  border-radius: 10px;
  display: inline-block;
  width: 250px;
}

footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
  <h1>La Union Dance Company</h1>
  <p>Bachata & Salsa Classes in USA</p>
</header>

<nav>
  <a href="#clases">Clases</a>
  <a href="#horarios">Horarios</a>
  <a href="#precios">Precios</a>
  <a href="#contacto">Contacto</a>
</nav>

<section id="clases">
  <h2>Clases</h2>
  <div class="card">Bachata</div>
  <div class="card">Salsa</div>
</section>

<section id="horarios">
  <h2>Horarios</h2>
  <p>Lunes a Viernes: 6pm - 10pm</p>
</section>

<section id="precios">
  <h2>Precios</h2>
  <div class="card">$15 Clase</div>
  <div class="card">$100 Mensual</div>
</section>

<section id="contacto">
  <h2>Contacto</h2>
  <p>WhatsApp: +1 XXX XXX XXXX</p>
</section>

<footer>
  <p>© 2026 La Union Dance Company</p>
</footer>

</body>
</html>
